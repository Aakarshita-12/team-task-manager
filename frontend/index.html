<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0e17;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #1a1828;
      border-radius: 20px;
      border: 0.5px solid rgba(255,255,255,0.08);
      padding: 40px 36px 36px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #f5f4ff;
      font-weight: 400;
    }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.38); margin-bottom: 28px; }
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 26px;
    }
    .tab {
      flex: 1; padding: 9px;
      text-align: center; cursor: pointer;
      font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,0.38);
      border-radius: 7px;
      transition: all 0.2s;
      user-select: none;
    }
    .tab.active { background: #6366f1; color: #fff; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.5);
      margin-bottom: 7px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 14px;
      color: #f5f4ff;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.22); }
    input:focus, select:focus {
      border-color: #6366f1;
      background: rgba(99,102,241,0.08);
    }
    select option { background: #1a1828; }
    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none;
      border-radius: 10px;
      font-size: 15px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.99); }
    .message {
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.error { background: rgba(239,68,68,0.12); color: #f87171; border: 0.5px solid rgba(239,68,68,0.2); }
    .message.success { background: rgba(52,211,153,0.1); color: #34d399; border: 0.5px solid rgba(52,211,153,0.2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🗂️</div>
      <h1>TaskManager</h1>
    </div>
    <p class="subtitle">Manage your team & projects</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login', this)">Login</div>
      <div class="tab" onclick="switchTab('signup', this)">Sign Up</div>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button onclick="login()">Login</button>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create a password" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="signupRole">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button onclick="signup()">Create Account</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('message').style.display = 'none';
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      msg.style.display = 'block';
    }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showMessage('Please fill all fields', 'error');

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('name', data.name);
        window.location.href = '/dashboard.html';
      } else {
        showMessage(data.message, 'error');
      }
    }

    async function signup() {
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const role = document.getElementById('signupRole').value;
      if (!name || !email || !password) return showMessage('Please fill all fields', 'error');

      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role })
      });
      const data = await res.json();
      if (res.ok) {
        showMessage('Account created! Please login.', 'success');
        switchTab('login', document.querySelector('.tab'));
      } else {
        showMessage(data.message, 'error');
      }
    }
  </script>
</body>
</html>
